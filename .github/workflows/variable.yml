name: Variables vs Secrets Demo

on:
  workflow_dispatch:

jobs:

  variables-demo:

    runs-on: ubuntu-latest

    steps:

      - name: Print Variables

        run: |
          echo "Application Name:"
          echo "${{ vars.APP_NAME }}"

          echo "Environment:"
          echo "${{ vars.ENVIRONMENT }}"

      - name: Print Secret

        run: |
          echo "Secret Value:"
          echo "${{ secrets.MY_SECRET }}"