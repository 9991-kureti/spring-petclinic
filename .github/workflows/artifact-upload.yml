name: Upload Artifact Demo

on:
  workflow_dispatch:

jobs:

  upload-artifact:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create File

        run: |
          echo "Hello Krishna" > demo.txt
          cat demo.txt

      - name: Upload Artifact

        uses: actions/upload-artifact@v4

        with:
          name: demo-file
          path: demo.txt